name: CI

on:
    push:
    pull_request:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        strategy:
            matrix:
                # Pinned to 24.15.0: Node 24.16.0 has an extract-zip regression
                # (https://github.com/nodejs/node/issues/63487) that hangs
                # cypress/playwright install scripts, freezing `npm ci` indefinitely.
                # Revisit once a fixed 24.x release is available in setup-node.
                node-version: [24.15.0]
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
            - run: npm ci
            - name: Build
              run: npm run build
            - name: Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: build-artifacts
                  path: ./dist

    lint:
        name: Lint
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [24.15.0]
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
            - run: npm ci
            - name: Lint
              run: npm run lint

    test-vitest:
        name: Vitest Tests
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [24.15.0]
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
            - run: npm ci
            - name: Test
              run: npm run test -- --run

    test-cypress:
        name: Cypress Component Tests
        runs-on: ubuntu-latest
        strategy:
            matrix:
                # Pinned to 24.15.0: Node 24.16.0 has an extract-zip regression
                # (https://github.com/nodejs/node/issues/63487) that hangs
                # cypress/playwright install scripts, freezing `npm ci` indefinitely.
                # Revisit once a fixed 24.x release is available in setup-node.
                node-version: [24.15.0]
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
            - run: npm ci
            - name: Cypress run
              run: npm run test-cypress-all
            - name: Upload screenshots on failure
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: cypress-screenshots
                  path: ./cypress/screenshots
                  if-no-files-found: ignore
